{% extends "base.html" %}
{% block title %}Upload Resume{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4"><i class="bi bi-cloud-upload text-primary"></i> Upload Your Resume</h2>
                <p class="text-muted text-center">Upload your resume in PDF format and let our AI analyze it.</p>
                <form method="POST" enctype="multipart/form-data" class="mt-4">
                    <div class="mb-4">
                        <label for="resume" class="form-label">Choose PDF File</label>
                        <input class="form-control form-control-lg" type="file" id="resume" name="resume" accept=".pdf" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-robot"></i> Analyze Resume
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
